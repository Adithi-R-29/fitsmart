<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Fitness Plan — FitSmart AI</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-wrapper">

    <header class="site-header">
      <div class="logo-mark">⚡</div>
      <div>
        <h1 class="site-title">FitSmart <span class="accent">AI</span></h1>
        <p class="site-tagline">Your Personal AI Fitness Coach</p>
      </div>
    </header>

    <div class="card result-card">
      <div class="result-header">
        <div class="result-icon">🏆</div>
        <div>
          <h2 class="result-title">Your Personalised Fitness Plan</h2>
          <p class="result-meta">Generated by Gemini AI</p>
        </div>
      </div>

      <div class="plan-body">
        {{ plan | safe }}
      </div>

      <div class="result-actions">
        <a href="/" class="btn-secondary">← Generate Another Plan</a>
        <button class="btn-secondary" onclick="window.print()">🖨️ Print / Save as PDF</button>
      </div>
    </div>

    <footer class="site-footer">
      Powered by <strong>Google Gemini</strong> · Built with Flask &amp; ❤️
    </footer>

  </div>
</body>
</html>
